[profile.default]
libs = ['dependencies']

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

solc = "0.8.25"
optimizer = true
optimizer_runs = 1000
evm_version = "cancun"
bytecode_hash = "none"
cbor_metadata = false

# Vendored Flare interface files (MIT-licensed, under src/vendor/).
# Neither flare-smart-contracts repo is on soldeer; only these specific
# interfaces are needed, so they're checked in rather than pulled as
# submodules.
remappings = [
  "flare-smart-contracts/=src/vendor/flare-smart-contracts/",
  "flare-smart-contracts-v2/=src/vendor/flare-smart-contracts-v2/",
]

fs_permissions = [
  { access = "read-write", path = "src/generated" },
  { access = "read-write", path = "meta" },
]

[dependencies]
forge-std = "1.16.1"
"@openzeppelin-contracts" = "5.6.1"
"rain-deploy" = "0.1.2"
"rain-extrospection" = "0.1.0"
"rain-interpreter-interface" = "0.1.0"
"rain-intorastring" = "0.1.0"
"rain-lib-hash" = "0.1.0"
"rain-lib-memkv" = "0.1.0"
"rain-lib-typecast" = "0.1.0"
"rain-math-binary" = "0.1.1"
"rain-math-float" = "0.1.1"
"rain-metadata" = "0.1.0"
"rain-sol-codegen" = "0.1.0"
"rain-solmem" = "0.1.3"
"rain-string" = "0.2.0"
"rain-tofu-erc20-decimals" = "0.1.1"
"rainlang" = "0.1.1"

[soldeer]
recursive_deps = false
